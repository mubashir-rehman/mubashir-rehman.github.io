        highlights:
          - "**AI-Powered LinkedIn Content Automation (Brandmate) – Lead Backend Engineer:** Architected Django REST Framework application as sole backend developer, building 60+ REST API endpoints across 7 apps supporting AI-powered LinkedIn content generation and automated post scheduling"
          - Designed versioned prompt management system extracting prompts from n8n workflows and implementing backend injection for 6 of 8 AI workflows, enabling A/B testing without code changes
          - Developed multi-tier LinkedIn profile scraping with official API, third-party fallback, and OpenAI-powered human-in-the-loop extraction, achieving 95%+ data retrieval success rate
          - Implemented real-time WebSocket updates using Django Channels for live post status notifications and integrated Stripe payment system with subscription management
          - Built LinkedIn OAuth 2.0 flow with mobile deep linking and JWT authentication using SimpleJWT for seamless cross-platform experience
          - Containerized application using Docker and deployed to self-hosted production server, creating automated testing suite with 89 passing tests
          - Authored 66% of repository commits (182 of 274), developing 11,000+ lines of production Python code
          - "**Cryptocurrency Intelligence Platform (Coin Intelligence Bot):** Designed GitHub Actions CI/CD pipeline with branch-based deployments and automated environment configuration using SSH key authentication"
          - Built multi-stage Docker builds orchestrating 10+ microservices with Docker Compose including health checks and dependency ordering
          - Integrated Google Gemini API for cryptocurrency due diligence analysis with automatic rate limit handling, exponential backoff retry, and Redis caching achieving 90%+ cache hit rate
          - Developed semantic embedding pipeline using Gemini text-embedding-004 generating 768-dimensional vectors and implemented pgvector similarity search for real-time cryptocurrency mention matching
          - Built async contract analysis microservice with Routescan/Etherscan API integration supporting 6 blockchain networks, implementing token bucket rate limiting (5 calls/sec) and LRU caching achieving 80%+ hit rates
          - Created DEX event parser detecting LP creation from Uniswap, PancakeSwap, and SushiSwap factory contracts with scam detection heuristics
          - Architected real-time social media ingestion pipeline processing 100+ cryptocurrency mentions per hour from Telegram, Discord, and Twitter with background task processing using ARQ/Redis and Celery
          - "**HRMS & AI/ML Integration Projects:** Designed and optimized PostgreSQL schemas supporting high-throughput AI workloads, reducing query latency by 30% through strategic indexing and query optimization"
          - Migrated HRMS operations to Horilla (Django-based), customizing and white-labeling platform with enhanced import tools and streamlined payroll/attendance workflows
          - Deployed Dockerized HRMS on DigitalOcean using Systemd for persistent uptime with automated rollback capabilities
          - Implemented OAuth2.0 flows with refresh-token handling and enhanced observability by extending logging framework, reducing support tickets by 25%
      
      - company: Veritus Software
        position: Team Lead & Software Engineer
        start_date: 2023-07
        end_date: 2025-03
        location: Lahore, Pakistan
        highlights:
          - "**Advanced Drone Control and Simulation Systems:** Developed and enhanced QGroundControl using Qt framework, integrating custom UI features in QML and optimizing drone swarm control algorithms"
          - Modified Gazebo simulation environments supporting multi-drone telemetry for real-time interaction with QGroundControl
          - Implemented high-performance telemetry transfer using multithreading, multiprocessing, and MQTT protocols ensuring seamless ground-to-drone communication
          - Established Dockerized development environments with Vagrant for isolated testing, enabling efficient CI/CD workflows
          - Led Agile team delivering incremental demos using Jira for task management, creating technical presentations with diagrams and multimedia
          - "**Python-Based Drone Ground Control and Video Processing:** Transitioned ground control systems to Olympe (Python) and Sphinx, integrating advanced telemetry handling using multiprocessing and MQTT"
          - Engineered video streaming from Sphinx simulator to Android applications, incorporating OpenCV for real-time object detection and obstacle avoidance
          - Enhanced Android ground control station integrating OpenStreetMap and Bing Maps APIs for real-time navigation and drone tracking
          - "**AWS Infrastructure Automation and Cloud Deployment:** Automated creation and management of AWS resources including VPCs, subnets, EC2 instances, IAM roles, and ECS services using Boto3 and JSON-configured setups"
          - Deployed Flask applications on ECS with Dockerized environments ensuring public access through Dynu DDNS
          - Delivered end-to-end solutions from infrastructure provisioning to OAuth authentication and public accessibility
          - "**AI-Powered Prompt Enhancer Web Application:** Built full-stack web application with AI-powered tools including Prompt Template Generator, Function Helper, Project Generator, and Task Planner"
          - Integrated OpenAI GPT models for natural language processing and code generation achieving high user satisfaction
          - Managed role-based access control (RBAC) using Django with AWS S3 for secure storage of user content
          - Established CI/CD pipelines using Docker and Boto3 for AWS ECS achieving seamless scaling and reliability
      
      - company: Information Technology University
        position: Teaching Assistant
        start_date: 2023-01
        end_date: 2023-05
        location: Lahore, Pakistan
        highlights:
          - "**Advanced Operating Systems (Graduate Level):** Facilitated discussions on OS research topics including Scheduler Activations, Superpages, GFS, Exokernel, VMware, and Xen virtualization"
          - Analyzed foundational research papers guiding students in literature reviews and technical paper writing
          - Supported students in implementing research-inspired projects in memory management and distributed systems
          - "**Operating Systems (Undergraduate Level):** Designed hands-on lab assignments for indexed file systems, multithreaded applications, and process scheduling algorithms"
          - Guided students in debugging with Valgrind and utilizing Vagrant for OS virtualization
          - Provided personalized assistance enhancing understanding of process management, memory allocation, and synchronization
      
      - company: GameBole Studios
        position: Game Development Intern
        start_date: 2022-03
        end_date: 2022-07
        location: Lahore, Pakistan
        highlights:
          - Developed multi-level endless runner game for Android using Unity and C# with advanced mechanics including level progression, power-ups, and dynamic obstacles
          - Optimized performance with object pooling reducing memory consumption ensuring smooth experience across Android devices
          - Integrated Google Play Services for leaderboards and achievements providing social engagement features
          - Built web-based endless runner using PlayCanvas and JavaScript implementing memory optimization strategies including scene pre-loading and asset reuse
    
    projects:
      - name: Cardiovascular Age Prediction using Single-Lead ECG
        start_date: 2023-01
        end_date: 2024-11
        highlights:
          - Designed cost-effective health monitoring system ($10 hardware) using ESP32 microcontroller and AD8232 ECG sensor for real-time data collection from 42 subjects
          - Implemented complete signal processing pipeline using NeuroKit2 and SciPy for ECG feature extraction from 126 minutes of recorded data
          - Trained machine learning models using Random Forest and 1D CNN achieving R² = 0.99 for vascular age prediction from 6,131 ECG segments
          - Applied transfer learning using ResNet-18 on spectrogram images achieving MSE = 0.99, R² = 0.87
          - Performed explainable AI analysis identifying ECG markers associated with vascular ageing and smoking-induced physiological changes
          - Co-authored research paper published as arXiv preprint and accepted in Circuits, Systems, and Signal Processing (CSSP) journal
      
      - name: Remote Job Scheduler
        start_date: 2023-01
        end_date: 2023-05
        highlights:
          - Developed server-client application enabling remote command execution and job scheduling for distributed systems using C and TCP/IP
          - Leveraged multi-threading (Pthread) for concurrent task handling improving system responsiveness and load balancing
          - Implemented process control using Exec and Fork for secure and efficient remote job execution
      
      - name: Publisher-Subscriber System for Topics
        start_date: 2022-09
        end_date: 2022-12
        highlights:
          - Designed scalable publisher-subscriber system supporting real-time messaging with Redis for fast in-memory caching
          - Integrated SQL database for durable topic storage with Node.js backend managing subscriptions and message routing
      
      - name: Simple Indexed File System
        start_date: 2022-02
        end_date: 2022-05
        highlights:
          - Developed indexed file system optimizing data retrieval by replacing linked structures with indexed blocks
          - Implemented core operations including file creation, allocation, and directory management
          - Validated with test scenarios ensuring reliability and efficient memory utilization
    
    publications:
