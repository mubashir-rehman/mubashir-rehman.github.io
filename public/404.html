<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      var l = window.location;
      sessionStorage.redirect = l.pathname + l.search + l.hash;
      l.replace(l.protocol + '//' + l.host + '/');
    </script>
  </head>
  <body></body>
</html>
